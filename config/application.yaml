# 参考 `application-example.yaml` 并在处添加订阅规则，请注意缩进
# Refer to `application-example.yaml` and add subscription rules there，please note the indentation

application:

  input:

    - name: EasyPrivacy
      path: https://easylist.to/easylist/easyprivacy.txt
      type: easylist

    - name: AdGuard URL跟踪过滤器
      path: https://filters.adtidy.org/extension/ublock/filters/17_optimized.txt
      type: easylist

    - name: AdGuard 恼人广告过滤器
      path: https://filters.adtidy.org/extension/ublock/filters/14_optimized.txt
      type: easylist

    - name: NoAppDownload
      path: https://raw.githubusercontent.com/Noyllopa/NoAppDownload/master/NoAppDownload.txt
      type: easylist

    - name: AdGuard Social Media filter
      path: https://filters.adtidy.org/extension/ublock/filters/4_optimized.txt
      type: easylist

    - name: AdGuard Cookie Notices filter
      path: https://filters.adtidy.org/extension/ublock/filters/18_optimized.txt
      type: easylist


  output:
    file_header: |
      Title: Additional List
      Total Size: ${total}
      Last Modified: ${date}
      Homepage: https://github.com/cjchxgxhc/ad-filters-subscriber

    files:
      - name: easylist.txt
        type: easylist

      - name: dns.txt
        type: dns

      - name: modify.txt
        type: easylist
        filter:
          - unknown


  config:

      dns-probe:
        enable: false
        parallel: 128
        provider:
          - host: 1.1.1.1
            port: 53

          - host: 8.8.8.8
            port: 53

      excludes:
        - "edge.microsoft.com"
#        - "metok.sys.miui.com"
        - "assets.msn.com"
